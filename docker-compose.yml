# Serviços:
#  postgres - banco principal (inmet_db, airflow_db, metabase_db)
#  airflow-init - inicializa banco de metadados e cria usuário admin
#  airflow-webserver - UI do Airflow
#  airflow-scheduler - agendador de tasks
#  dbt-docs - serve documentação dbt na porta configurável
#  metabase - dashboards conectados ao schema gold
#  inmet-ingestion - ingestão pontual (profile: bootstrap)
#  
# Se alguma porta estiver ocupada, edite o .env:
#  AIRFLOW_PORT=8082
#  METABASE_PORT=3001
#  DBT_DOCS_PORT=8082

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB}
    AIRFLOW__WEBSERVER__RBAC: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "inmet-airflow-secret-2026"
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ANALYTICS_USER: ${ANALYTICS_USER}
    ANALYTICS_PASSWORD: ${ANALYTICS_PASSWORD}
    INMET_YEARS: ${INMET_YEARS}
    INMET_BASE_URL: ${INMET_BASE_URL}
    LOAD_MODE: ${LOAD_MODE}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/include:/opt/airflow/include
    - ./ingestion:/opt/project/ingestion
    - ./great_expectations:/opt/project/great_expectations
    - ./dbt:/opt/project/dbt
    - ./docs:/opt/project/docs
  depends_on:
    postgres:
      condition: service_healthy

services:

  # PostgreSQL
  postgres:
    image: postgres:16
    container_name: inmet-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_LOCAL_PORT:-5432}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Airflow - inicialização única
  airflow-init:
    <<: *airflow-common
    container_name: inmet-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init && \
        airflow users create \
          --role Admin \
          --username ${AIRFLOW_USER} \
          --password ${AIRFLOW_PASSWORD} \
          --firstname Air \
          --lastname Flow \
          --email airflow@inmet.local || true
    restart: on-failure

  # Airflow - webserver (UI)
  airflow-webserver:
    <<: *airflow-common
    container_name: inmet-airflow-webserver
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()\""]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Airflow - scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: inmet-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # dbt
  dbt-docs:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    container_name: inmet-dbt-docs
    entrypoint: /bin/bash
    command:
      - -c
      - |
        cd /opt/project/dbt/inmet_analytics && \
        dbt deps --profiles-dir /opt/project/dbt && \
        dbt docs generate --profiles-dir /opt/project/dbt && \
        dbt docs serve --profiles-dir /opt/project/dbt --host 0.0.0.0 --port 8081
    ports:
      - "${DBT_DOCS_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${ANALYTICS_USER}
      POSTGRES_PASSWORD: ${ANALYTICS_PASSWORD}
    volumes:
      - ./dbt:/opt/project/dbt
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Metabase - dashboards conectados ao schema gold
  metabase:
    image: metabase/metabase:v0.50.13
    container_name: inmet-metabase
    ports:
      - "${METABASE_PORT:-3001}:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${METABASE_DB}
      MB_DB_USER: ${METABASE_DB_USER}
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
    volumes:
      - ./metabase-data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Ingestão INMET
  # Executar manualmente quando necessário:
  #   docker compose --profile bootstrap up inmet-ingestion
  inmet-ingestion:
    build:
      context: ./ingestion
    container_name: inmet-ingestion
    profiles: ["bootstrap"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      INMET_YEARS: ${INMET_YEARS}
      INMET_BASE_URL: ${INMET_BASE_URL}
      LOAD_MODE: ${LOAD_MODE}
    command: ["python", "ingest_inmet.py"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
