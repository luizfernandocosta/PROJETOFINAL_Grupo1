inmet_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'inmet_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'inmet_password') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'inmet_db') }}"
      schema: gold
      threads: 4
      keepalives_idle: 0
      connect_timeout: 30
